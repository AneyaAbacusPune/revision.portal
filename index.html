<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aneya Abacus Katraj | Portal</title>
    <style>
        body { background-color: #165430; font-family: 'Arial', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; user-select: none; -webkit-user-select: none; }
        .card { background-color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 450px; }
        .wide-card { max-width: 800px; width: 95%; display: none; background-color: #ffffff; padding: 30px; border-radius: 12px; }
        
        /* Profile Hub Styles */
        .profile-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #e0e0e0; padding-bottom: 20px; margin-bottom: 20px; }
        .avatar-circle { width: 80px; height: 80px; background: #f8f9fa; border: 3px solid #f36621; border-radius: 50%; overflow: hidden; cursor: pointer; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info { text-align: left; flex-grow: 1; margin-left: 15px; }
        .profile-name { font-size: 22px; font-weight: bold; color: #165430; margin: 0; }
        .profile-level { font-size: 14px; color: #555; background: #e0e0e0; padding: 3px 8px; border-radius: 12px; display: inline-block; margin-top: 5px; font-weight: bold;}
        .streak-box { text-align: center; background: #fff3ed; border: 2px solid #f36621; border-radius: 12px; padding: 10px; }
        .streak-num { font-size: 24px; font-weight: bold; color: #f36621; margin: 0; }
        
        /* Navigation Grid */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .nav-btn { background: #165430; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-btn.orange { background: #f36621; }
        .nav-btn.greyed-out { opacity: 0.5; pointer-events: none; background: #555; }

        /* Leaderboard Styles */
        .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; text-align: left; background: #fdfdfd; margin-bottom: 5px; border-radius: 6px; }
        .lb-rank { font-weight: bold; font-size: 18px; width: 30px; }
        .lb-name { flex-grow: 1; font-weight: bold; color: #333; }
        .lb-stats { text-align: right; font-size: 14px; color: #666; }
        .warning-tag { background: #fc0202; color: white; padding: 2px 6px; border-radius: 8px; font-size: 11px; font-weight: bold; margin-left: 10px; }
        
        /* Metallic Tags */
        .rank-1 { background: linear-gradient(45deg, #ffd700, #ffdf00, #d4af37); color: #000; border: 1px solid #b8860b; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .rank-2 { background: linear-gradient(45deg, #e0e0e0, #f8f9fa, #c0c0c0); color: #000; border: 1px solid #a9a9a9; }
        .rank-3 { background: linear-gradient(45deg, #cd7f32, #d2691e, #8b4513); color: white; border: 1px solid #8b4513; }

        /* General Inputs & Buttons */
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; text-align: center; }
        .btn-full { width: 100%; background: #f36621; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        /* Exam Layout */
        #examSection { display: none; background-color: #ffffff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 95%; max-width: 1000px; overflow: hidden; }
        .exam-layout { display: flex; flex-direction: row; }
        .left-panel { flex: 2; padding: 30px; }
        .right-panel { flex: 1; background-color: #f8f9fa; border-left: 2px solid #e0e0e0; padding: 30px; display: flex; flex-direction: column; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background-color: #165430; color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; }
        .timer { font-size: 20px; font-weight: bold; color: #f36621; }
        
        .math-container { font-size: 36px; font-family: 'Courier New', monospace; font-weight: bold; display: flex; flex-direction: column; align-items: center; margin: 0 auto 30px auto; line-height: 1.6; }
        .math-aligner { display: flex; flex-direction: column; align-items: flex-end; width: 150px; }
        .math-aligner div { text-align: right; width: 100%; letter-spacing: 2px; }
        
        .mcq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 300px; margin: 0 auto 25px auto; }
        .mcq-btn { background: #f8f9fa; border: 2px solid #e0e0e0; padding: 15px; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; gap: 8px; }
        .mcq-btn.selected { background: #f36621; color: white; border-color: #f36621; }

        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; flex-grow: 1; align-content: start; }
        .grid-btn { background-color: #e0e0e0; color: #555; border: 2px solid #ccc; padding: 10px 0; font-size: 14px; border-radius: 6px; cursor: pointer; }
        .grid-btn.answered { background-color: #165430; color: white; border-color: #165430; }

        /* Security Overlays */
        #camera-container { display: none; position: fixed; bottom: 20px; right: 20px; width: 130px; height: 130px; border-radius: 50%; overflow: hidden; border: 4px solid #f36621; box-shadow: 0 8px 20px rgba(0,0,0,0.4); z-index: 1500; background-color: #000; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background-color: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
        #countdownOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #165430; color: #f36621; font-size: 150px; font-weight: bold; justify-content: center; align-items: center; z-index: 3000; }
        
        .badge-case { background: #f8f9fa; border-radius: 8px; padding: 10px; margin-bottom: 20px; min-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #888; border: 1px dashed #ccc;}

        @media (max-width: 768px) { .exam-layout { flex-direction: column; } .right-panel { border-left: none; border-top: 2px solid #e0e0e0; padding: 20px; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- OVERLAYS -->
    <div id="countdownOverlay">3</div>
    <div id="camera-container"><video id="webcam" autoplay playsinline muted></video></div>
    <canvas id="securityCanvas" width="50" height="50" style="display:none;"></canvas>

    <div id="securityModal" class="modal-overlay">
        <div class="modal-content"><h3 style="color: red;">⚠️ Camera Blocked</h3><p>Face the camera to resume.</p></div>
    </div>
    <div id="tabModal" class="modal-overlay">
        <div class="modal-content"><h3 style="color: red;">⚠️ Security Warning</h3><p>Tab switching logged.</p>
        <button onclick="document.getElementById('tabModal').style.display='none'" class="btn-full" style="background:#165430;">I Understand</button></div>
    </div>

    <!-- 1. LOGIN SECTION -->
    <div id="loginSection" class="card">
        <h2 style="color: #165430;">Aneya Abacus<br><span style="font-size: 18px; color: #f36621;">Student Portal</span></h2>
        <input type="number" id="mobileInput" placeholder="Mobile Number">
        <input type="password" id="passwordInput" placeholder="Password">
        <button onclick="performLogin()" class="btn-full" id="loginBtn">Login</button>
        <p id="msgBox" style="color: red; margin-top: 15px; display: none;"></p>
    </div>

    <!-- 2. PROFILE HUB -->
    <div id="profileSection" class="card" style="display: none; max-width: 500px;">
        <div class="profile-header">
            <div style="display:flex; align-items:center;">
                <div class="avatar-circle" onclick="alert('Avatar unlock shop coming soon!')"><img id="profAvatar" src=""></div>
                <div class="profile-info">
                    <h3 class="profile-name" id="profName">Student Name</h3>
                    <div class="profile-level" id="profLevel">Level -</div>
                </div>
            </div>
            <div class="streak-box">
                <div style="font-size: 12px; color: #888; font-weight:bold;">STREAK</div>
                <div class="streak-num" id="profStreak">🔥 0</div>
            </div>
        </div>
        
        <div style="text-align: left; font-weight: bold; color: #555; margin-bottom: 5px;">Trophy Case</div>
        <div class="badge-case" id="profBadges">No badges earned yet. Keep grinding!</div>

        <div class="nav-grid" id="navGrid">
            <button class="nav-btn" onclick="alert('Dashboard coming soon!')">Dashboard</button>
            <button class="nav-btn" onclick="openLeaderboard()">Leaderboard</button>
            <button class="nav-btn orange" onclick="initTest(true)">Practice Mode</button>
            <button class="nav-btn orange" onclick="initTest(false)" style="background: #e74c3c;">Start Test</button>
        </div>
        <p id="hubMsg" style="color: red; margin-top: 15px; font-weight:bold;"></p>
    </div>

    <!-- 3. LEADERBOARD -->
    <div id="leaderboardSection" class="wide-card">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #165430; padding-bottom: 10px; margin-bottom:20px;">
            <h2 style="margin:0; color:#165430;">Weekly Ranks</h2>
            <select id="lbLevelSelect" onchange="fetchLeaderboard()" style="width: 120px; margin:0; padding:8px;">
                <option value="Jr">Jr</option><option value="Sr">Sr</option>
                <option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option>
            </select>
        </div>
        <div id="lbContent">Loading elite rankings...</div>
        <button class="btn-full" onclick="backToProfile()" style="margin-top: 20px; background:#333;">Back to Profile</button>
    </div>

    <!-- 4. EXAM INTERFACE -->
    <div id="examSection">
        <div class="exam-layout">
            <div class="left-panel">
                <div class="header-bar"><span id="examTitle">Live Test</span><span class="timer" id="timerDisplay">15:00</span></div>
                <h4 id="currentQInfo" style="color:#555;">Question 1 of 30</h4>
                <div class="math-container"><div class="math-aligner" id="mathDisplay"></div></div>
                <div id="mcqContainer" class="mcq-grid"></div>
            </div>
            <div class="right-panel">
                <h3 style="color:#165430; margin-top:0;">Question Palette</h3>
                <div class="grid-container" id="qGrid"></div>
                <button id="submitExamBtn" class="btn-full" onclick="submitTest()">Submit Exam</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // INSERT YOUR APPS SCRIPT URL HERE
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbynaiUC4KCIubk1EasL70xVD2iPUmQcVOMd7ANp1W69dIGW0AQFkDgA3nYap2lVuSw-/exec";
        const SECRETS = "ANEYA_KATRAJ_2026_SECURE";
        
        let studentData = {}, questions = [], currentIndex = 0, answers = {};
        let timerInterval, securityInterval, examEndTime = 0, examStartTime = 0;
        let isPracticeMode = false, examActive = false, tabSwitches = 0, videoStream = null;

        // Uses free fast robot avatars based on ID 1-12
        function getAvatarUrl(id) { return `https://api.dicebear.com/7.x/bottts/svg?seed=Aneya${id}`; }

        function lockNav() {
            let btns = document.getElementById('navGrid').getElementsByTagName('button');
            for(let b of btns) b.classList.add('greyed-out');
        }
        function unlockNav() {
            let btns = document.getElementById('navGrid').getElementsByTagName('button');
            for(let b of btns) b.classList.remove('greyed-out');
            document.getElementById('hubMsg').innerText = "";
        }

        async function performLogin() {
            const mobile = document.getElementById('mobileInput').value;
            const pwd = document.getElementById('passwordInput').value;
            const msg = document.getElementById('msgBox');
            if(!mobile || !pwd) { msg.style.display="block"; msg.innerText="Enter details!"; return; }
            
            document.getElementById('loginBtn').disabled = true;
            msg.style.display="block"; msg.style.color="#165430"; msg.innerText="Authenticating...";
            
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", mobile: mobile, password: pwd, apiKey: SECRETS }) });
                let data = await res.json();
                
                if(data.success) {
                    studentData = data; studentData.mobile = mobile;
                    document.getElementById('loginSection').style.display = "none";
                    
                    document.getElementById('profName').innerText = data.name;
                    document.getElementById('profLevel').innerText = "Level " + data.level;
                    document.getElementById('profStreak').innerText = "🔥 " + data.currentStreak;
                    document.getElementById('profAvatar').src = getAvatarUrl(data.avatarId);
                    if(data.badges) document.getElementById('profBadges').innerHTML = `<span style='color:#f36621; font-weight:bold;'>🏆 ${data.badges}</span>`;
                    
                    document.getElementById('lbLevelSelect').value = data.level; // Default LB to their level
                    document.getElementById('profileSection').style.display = "block";
                } else { 
                    msg.style.color="red"; msg.innerText = data.message; document.getElementById('loginBtn').disabled = false;
                }
            } catch(e) { msg.style.color="red"; msg.innerText = "Connection failed!"; document.getElementById('loginBtn').disabled = false; }
        }

        function backToProfile() {
            document.getElementById('leaderboardSection').style.display = "none";
            document.getElementById('profileSection').style.display = "block";
            unlockNav();
        }

        async function openLeaderboard() {
            lockNav();
            document.getElementById('profileSection').style.display = "none";
            document.getElementById('leaderboardSection').style.display = "block";
            fetchLeaderboard();
        }

        async function fetchLeaderboard() {
            const lvl = document.getElementById('lbLevelSelect').value;
            const box = document.getElementById('lbContent');
            box.innerHTML = "<p>Crunching the weekly numbers...</p>";
            
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getLeaderboard", reqLevel: lvl, apiKey: SECRETS }) });
                let data = await res.json();
                
                if(data.success && data.board.length > 0) {
                    let html = "";
                    data.board.forEach((r, idx) => {
                        let rankClass = idx === 0 ? "rank-1" : idx === 1 ? "rank-2" : idx === 2 ? "rank-3" : "";
                        let cheatTag = r.warnings > 0 ? `<span class="warning-tag">⚠️ ${r.warnings} Logs</span>` : "";
                        html += `<div class="lb-row ${rankClass}">
                                    <div class="lb-rank">${idx + 1}.</div>
                                    <div class="lb-name">${r.name}</div>
                                    <div class="lb-stats"><b>${r.score}/30</b> <br><span style="font-size:12px;">⏱️ ${r.timeStr}</span> ${cheatTag}</div>
                                 </div>`;
                    });
                    box.innerHTML = html;
                } else { box.innerHTML = "<p>No runs recorded for this level yet this week.</p>"; }
            } catch(e) { box.innerHTML = "<p style='color:red;'>Failed to load leaderboard.</p>"; }
        }

        async function initTest(isPractice) {
            lockNav();
            isPracticeMode = isPractice;
            let msg = document.getElementById('hubMsg');
            msg.innerText = isPractice ? "Loading Practice Sandbox..." : "Connecting Secure Live Exam...";
            
            if (!isPractice) {
                try {
                    videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    document.getElementById('webcam').srcObject = videoStream; 
                    document.getElementById('camera-container').style.display = "block";
                } catch (err) {
                    msg.innerText = "Camera Access Denied! Cannot start live exam."; unlockNav(); return; 
                }
            }

            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getQuestions", mobile: studentData.mobile, isPractice: isPracticeMode, apiKey: SECRETS }) });
                let data = await res.json();
                
                if(data.success && data.questions.length > 0) {
                    questions = data.questions.map(q => { q.options = generateOptions(q.answer); return q; });
                    startCountdown();
                } else { 
                    msg.innerText = data.message || "Failed to get questions."; 
                    if(videoStream) videoStream.getTracks().forEach(t => t.stop()); 
                    document.getElementById('camera-container').style.display = "none";
                    unlockNav(); 
                }
            } catch (err) {
                msg.innerText = "Database connection failed."; unlockNav();
            }
        }

        function generateOptions(correctAnswer) {
            let options = new Set(); let correct = Number(correctAnswer); options.add(correct);
            let offsets = [1, -1, 5, -5, 10, -10, 2, -2].sort(() => Math.random() - 0.5);
            for (let i = 0; i < offsets.length; i++) {
                if (options.size === 4) break;
                let fake = Number((correct + offsets[i]).toFixed(3));
                if (correct >= 0 && fake < 0) continue;
                options.add(fake);
            }
            let fall = 1; while(options.size < 4) { options.add(correct >= 0 ? Number((correct + fall).toFixed(3)) : Number((correct - fall).toFixed(3))); fall++; }
            return Array.from(options).sort(() => Math.random() - 0.5);
        }

        function startCountdown() {
            document.getElementById('profileSection').style.display = "none";
            const cEl = document.getElementById('countdownOverlay'); cEl.style.display = "flex"; let count = 3; cEl.innerText = count;
            let intv = setInterval(() => { count--; if(count > 0) cEl.innerText = count; else if(count === 0) cEl.innerText = "GO!"; else { clearInterval(intv); cEl.style.display = "none"; launchTestUI(); } }, 1000);
        }

        function launchTestUI() {
            examActive = true; tabSwitches = 0; answers = {}; currentIndex = 0;
            examStartTime = Date.now(); examEndTime = Date.now() + (15 * 60 * 1000);
            
            document.getElementById('examTitle').innerText = isPracticeMode ? "PRACTICE MODE (No Tracking)" : `LIVE EXAM: Level ${studentData.level}`;
            document.getElementById('examSection').style.display = "block";
            
            buildGrid(); loadQuestion(0);
            timerInterval = setInterval(updateTimer, 1000);
            if(!isPracticeMode) securityInterval = setInterval(checkSecurity, 2000);
        }

        function checkSecurity() {
            if (!examActive || isPracticeMode || !videoStream) return;
            const videoEl = document.getElementById('webcam'), track = videoStream.getVideoTracks()[0];
            let isBlocked = (!track || track.muted || videoEl.paused);
            if (!isBlocked && videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
                try {
                    const ctx = document.getElementById('securityCanvas').getContext('2d'); ctx.drawImage(videoEl, 0, 0, 50, 50); 
                    let frame = ctx.getImageData(0, 0, 50, 50).data, tot = 0, px = [];
                    for(let i=0; i<frame.length; i+=4) { let b = (frame[i]+frame[i+1]+frame[i+2])/3; tot+=b; px.push(b); }
                    let avg = tot/2500, d = 0; for(let i=0; i<px.length; i++) d += Math.abs(px[i]-avg);
                    if (avg < 15 || (d/2500) < 12) isBlocked = true;
                } catch(e) {}
            }
            document.getElementById('securityModal').style.display = isBlocked ? 'flex' : 'none';
            if(isBlocked) { tabSwitches++; document.getElementById('examSection').style.filter = "blur(30px)"; } 
            else document.getElementById('examSection').style.filter = "none";
        }

        document.addEventListener("visibilitychange", () => {
            if (examActive && !isPracticeMode) {
                if (Date.now() >= examEndTime) { submitTest(); return; }
                if (document.visibilityState === 'hidden') { tabSwitches++; document.getElementById('tabModal').style.display = 'flex'; }
            }
        });

        function buildGrid() {
            let html = ""; for(let i=0; i<questions.length; i++) html += `<button class="grid-btn" id="btn-q${i}" onclick="loadQuestion(${i})">${i + 1}</button>`;
            document.getElementById('qGrid').innerHTML = html;
        }

        function loadQuestion(idx) {
            currentIndex = idx; document.getElementById('currentQInfo').innerText = `Question ${idx+1} of 30`;
            let h = ""; questions[idx].sum.split(',').forEach(n => h += `<div>${n.trim()}</div>`); document.getElementById('mathDisplay').innerHTML = h;
            let mH = "", cur = answers[idx], lbl = ['A','B','C','D'];
            questions[idx].options.forEach((opt, i) => {
                let sel = (cur !== undefined && cur == opt) ? "selected" : "";
                mH += `<button class="mcq-btn ${sel}" onclick="selectOpt(${opt})"><span style="color:#888;">${lbl[i]})</span> ${opt}</button>`;
            });
            document.getElementById('mcqContainer').innerHTML = mH;
            
            for(let i=0; i<30; i++) {
                let b = document.getElementById(`btn-q${i}`); b.className = "grid-btn";
                if(answers[i] !== undefined) b.classList.add('answered');
                if(i === currentIndex) b.style.borderColor = "#f36621"; else b.style.borderColor = "#ccc";
            }
        }

        function selectOpt(val) {
            answers[currentIndex] = val; loadQuestion(currentIndex);
            setTimeout(() => { if(currentIndex < 29) loadQuestion(currentIndex + 1); }, 300);
        }

        function updateTimer() {
            let t = Math.max(0, Math.round((examEndTime - Date.now()) / 1000));
            document.getElementById('timerDisplay').innerText = `${Math.floor(t/60)}:${t%60<10?'0':''}${t%60}`;
            if(t <= 0) submitTest();
        }

        async function submitTest() {
            examActive = false; clearInterval(timerInterval); clearInterval(securityInterval);
            if(videoStream) { videoStream.getTracks().forEach(t => t.stop()); document.getElementById('camera-container').style.display="none"; }
            
            document.getElementById('examSection').style.display = "none";
            
            let score = 0; for(let i=0; i<30; i++) if(answers[i] == questions[i].answer) score++;
            let timeS = Math.min(900, Math.floor((Date.now() - examStartTime) / 1000));
            let timeStr = `${Math.floor(timeS/60)}m ${timeS%60}s`;

            if(isPracticeMode) {
                alert(`PRACTICE COMPLETE!\nScore: ${score}/30\nTime: ${timeStr}\n(This was not recorded)`);
                document.getElementById('profileSection').style.display = "block";
                unlockNav(); return;
            }

            const cEl = document.getElementById('countdownOverlay'); cEl.style.display = "flex"; cEl.innerText = "Saving...";
            
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "submitExam", mobile: studentData.mobile, name: studentData.name, email: studentData.email, level: studentData.level, score: score, total: 30, apiKey: SECRETS, tabSwitches: tabSwitches, timeTaken: timeStr }) });
            } catch(e) {}
            
            alert(`EXAM SUBMITTED!\nScore: ${score}/30\nTime: ${timeStr}\nYour results have been locked in for the weekly leaderboard.`);
            location.reload(); 
        }
    </script>
</body>
</html>
